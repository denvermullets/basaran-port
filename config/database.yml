# setting up solidqueue to use a separate db as it is preferred in the docs
# additionally configuring local dev to work this way as well, even though
# it technically isn't needed. aiming to test mission control etc.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

# cache: &cache
#   <<: *default
#   migrations_paths: db/cache_migrate
# queue: &queue
#   <<: *default
#   migrations_paths: db/queue_migrate

development:
  primary:
    <<: *default
    database: basaran_port_development
  # cache:
  #   <<: *cache
  #   database: myapp_development_cache
  # queue:
  #   <<: *queue
  #   database: basaran_port_queue

test:
  <<: *default
  database: basaran_port_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
